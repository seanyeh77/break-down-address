# GitLab CI/CD Configuration for Python Project

stages:
  - test
  - lint
  - build

# Cache dependencies for faster builds
variables:
  UV_CACHE_DIR: "$CI_PROJECT_DIR/.cache/uv"

cache:
  paths:
    - .cache/uv
    - .venv

# Base configuration for all jobs
.base:
  image: python:3.12
  before_script:
    # Install uv
    - curl -LsSf https://astral.sh/uv/install.sh | sh
    - export PATH="$HOME/.local/bin:$PATH"
    # Sync dependencies
    - uv sync
  tags:
    - docker

# Run tests
test:
  extends: .base
  stage: test
  script:
    - echo "Running tests..."
    - uv run pytest tests/ -v --cov=src --cov-report=term --cov-report=xml
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week

# Run tests on Python 3.11
test:python3.11:
  extends: .base
  stage: test
  image: python:3.11
  script:
    - echo "Running tests on Python 3.11..."
    - uv run pytest tests/ -v
  allow_failure: true

# Code quality checks
lint:ruff:
  extends: .base
  stage: lint
  script:
    - echo "Running Ruff linter..."
    - uv run ruff check src/ tests/ --output-format=gitlab > ruff-report.json || true
    - uv run ruff check src/ tests/
  artifacts:
    reports:
      codequality: ruff-report.json
    expire_in: 1 week
  allow_failure: true

# Type checking with mypy
lint:mypy:
  extends: .base
  stage: lint
  script:
    - echo "Running mypy type checker..."
    - uv run mypy src/ --ignore-missing-imports || true
  allow_failure: true

# Check code formatting
lint:format:
  extends: .base
  stage: lint
  script:
    - echo "Checking code formatting..."
    - uv run ruff format --check src/ tests/
  allow_failure: true

# Build validation - ensure the package can run
build:validate:
  extends: .base
  stage: build
  script:
    - echo "Validating build..."
    - uv run python run.py --help || echo "No --help option, trying basic import"
    - uv run python -c "from src.main import main; print('Import successful')"
  only:
    - main
    - tags
